name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  semver:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.sr.outputs.new_release_version }}
      published: ${{ steps.sr.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v6
        with: { node-version: "24", cache: "npm" }
      - run: npm ci
      - id: sr
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            ${{ needs.semver.outputs.published == 'true' && format('ghcr.io/{0}:latest', github.repository) || '' }}
            ${{ needs.semver.outputs.published == 'true' && format('ghcr.io/{0}:{1}', github.repository, needs.semver.outputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Rollback release on push failure
        if: failure() && needs.semver.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "v${{ needs.semver.outputs.version }}" --yes --cleanup-tag
